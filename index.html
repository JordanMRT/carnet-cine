<!-- Styles critiques du splash screen, en ligne pour s'afficher instantanément
     sans attendre le chargement de style.css ou des polices externes. -->
<style>
  #splash-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1b1d2a;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  #splash-screen.splash--hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .splash__inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
  }
  .splash__logo-wrap {
    position: relative;
    width: 190px;
  }

  .splash__logo {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 12px 22px rgba(0,0,0,.45));
  }
  /* Conteneur de découpe séparé de l'image : contient le reflet dans le
     cadre du logo sans rogner son ombre portée (qui déborde de la boîte).
     L'inset colle précisément à la zone opaque réelle du ticket dans le
     PNG (marges transparentes mesurées : ~3.9% gauche/droite, ~9.9%
     haut/bas sur le canvas 570×352) plutôt qu'au rectangle complet du
     fichier — pas de mask-image, juste des marges calculées à la main
     pour un résultat fiable partout. */
  .splash__logo-clip {
    position: absolute;
    inset: 9.94% 3.86%;
    overflow: hidden;
    pointer-events: none;
  }
  .splash__logo-shine {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    -webkit-mask: url("ttb-logo-ticketcorn-flat.png") center / contain no-repeat;
    mask: url("ttb-logo-ticketcorn-flat.png") center / contain no-repeat;
  }
.splash__logo-shine::before {
   content: "";
   position: absolute;
   /* Grande bande diagonale */
   width: 60%;
   height: 250%;
   left: -80%;
   top: -75%;
    background: linear-gradient(
     90deg,
      transparent,
     rgba(255,255,255,.95),
     transparent
    );
    transform: rotate(35deg);
    animation: splashShine 2.4s ease-in-out infinite;
  }
  .splash__messages {
    position: relative;
    height: 1.3em;
  }
  .splash__msg {
    font-family: "Albert Sans", sans-serif;
    font-size: 0.9rem;
    color: #cfd2e0;
    white-space: nowrap;
    opacity: 0;
    animation: splashMsgIn 0.5s ease-out 0.35s forwards;
  }
  .splash__dots {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .splash__dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e8a33d;
    opacity: 0.35;
    animation: splashDot 1.1s ease-in-out infinite;
  }
  .splash__dots span:nth-child(2) { animation-delay: 0.15s; }
  .splash__dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes splashLogoIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes splashShine {
    0% {
      transform: translateX(0) rotate(35deg);
    }
      30% {
      transform: translateX(320%) rotate(35deg);
    }
      100% {
      transform: translateX(320%) rotate(35deg);
    }
  }
  @keyframes splashMsgIn {
    to { opacity: 1; }
  }
  @keyframes splashDot {
    0%, 80%, 100% { opacity: 0.35; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .splash__logo-wrap { animation: none; opacity: 1; transform: none; }
    .splash__logo-shine { display: none; }
    .splash__msg { animation: none; opacity: 1; }
    .splash__dots span { animation: none; opacity: 0.6; }
  }
</style>
</head>
<body>

<!-- Splash screen : masqué automatiquement par hideSplash() (js/utils.js)
     une fois le premier rendu de l'app terminé (voir App.renderShell). Dans
     l'immense majorité des cas (connexion correcte), il ne se voit que
     quelques centaines de ms — la boucle infinie ne sert qu'aux
     chargements plus lents. -->
<div id="splash-screen">
  <div class="splash__inner">
    <div class="splash__logo-wrap">
      <img
        src="ttb-logo-ticketcorn-flat.png"
        alt="Time To Binge"
        class="splash__logo"
        width="285"
        height="176"
      />
      <div class="splash__logo-shine" aria-hidden="true"></div>
    </div>
    <div class="splash__messages">
      <span class="splash__msg" id="splash-msg"></span>
    </div>
    <div class="splash__dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
<script>
  window.__splashShownAt = Date.now();
  // Un message tiré au hasard à chaque ouverture, pas un défilement des trois.
  var SPLASH_MESSAGES = ["Préparation de la salle", "Distribution de popcorn", "Bonne séance"];
  document.getElementById("splash-msg").textContent =
    SPLASH_MESSAGES[Math.floor(Math.random() * SPLASH_MESSAGES.length)];
</script>

<div id="root">
  <p class="loading">Chargement…</p>
</div>
