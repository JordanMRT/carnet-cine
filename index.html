<!-- Styles critiques du splash screen, en ligne pour s'afficher instantanément
     sans attendre le chargement de style.css ou des polices externes. -->
<style>
  #splash-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1b1d2a;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  #splash-screen.splash--hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .splash__inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
  }
  .splash__logo {
    width: 132px;
    height: auto;
    opacity: 0;
    transform: translateY(10px) scale(0.95);
    animation: splashLogoIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }
  .splash__dots {
    display: flex;
    gap: 8px;
  }
  .splash__dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #e8a33d;
    opacity: 0.35;
    animation: splashDot 1.1s ease-in-out infinite;
  }
  .splash__dots span:nth-child(2) { animation-delay: 0.15s; }
  .splash__dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes splashLogoIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes splashDot {
    0%, 80%, 100% { opacity: 0.35; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .splash__logo { animation: none; opacity: 1; transform: none; }
    .splash__dots span { animation: none; opacity: 0.6; }
  }
</style>
</head>
<body>

<!-- Splash screen : masqué automatiquement par hideSplash() (js/utils.js)
     une fois le premier rendu de l'app terminé (voir App.renderShell). -->
<div id="splash-screen">
  <div class="splash__inner">
    <img src="brand-top.png" alt="Time To Binge" class="splash__logo" width="220" height="120" />
    <div class="splash__dots" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>
</div>
<script>window.__splashShownAt = Date.now();</script>
